<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        header { 
            padding: 10px 20px; width: 100%; border-bottom: 1px solid #222; 
            background-color: #151515; display: flex; justify-content: space-between; align-items: center;
        }
        
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 45px; width: auto; object-fit: contain; }

        .auth-area { display: flex; gap: 10px; align-items: center; }
        .login-btn { 
            background: #4285F4; color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
        .user-info { font-size: 0.8rem; color: #888; display: none; }

        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; color: #fff; border-bottom-right-radius: 2px; border-right: 3px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; border-bottom-left-radius: 2px; }
        
        img.chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; display: block; }

        .input-area { width: 100%; max-width: 750px; padding: 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img">
            <span style="font-weight: bold; font-size: 1.2rem;">MIGS AI</span>
        </div>
        <div class="auth-area">
            <span id="userName" class="user-info"></span>
            <button id="loginBtn" class="login-btn" onclick="login()">Entrar com Google</button>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Manda a real, mano..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">Enviar</button>
    </div>

    <script type="module">
        // Importações do Firebase via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Suas configurações oficiais
        const firebaseConfig = {
            apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE",
            authDomain: "migs-ai.firebaseapp.com",
            projectId: "migs-ai",
            storageBucket: "migs-ai.firebasestorage.app",
            messagingSenderId: "497142458753",
            appId: "1:497142458753:web:e99b79b5128ec6e8d02080",
            measurementId: "G-6KET2PQE6W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let chatHistory = [];
        const API_KEY_GROQ = "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";

        // Prompt do Migs (Garoto, 16 anos)
        const systemPrompt = "Você é o Migs AI, um garoto de 16 anos, tutor sênior da Migs Studios. Use gírias como 'brother' e 'mano'. Seja direto e parceiro. REGRA DE IMAGEM: Se pedirem imagem, use: ![Image](https://loremflickr.com/1080/1080/DESCRIPTION).";

        // --- FUNÇÕES DE AUTH ---
        window.login = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                // O estado mudará no onAuthStateChanged
            } catch (error) {
                console.error("Erro no login:", error);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userName").style.display = "block";
                document.getElementById("userName").innerText = `E aí, ${user.displayName.split(' ')[0]}!`;
                await carregarHistorico();
            }
        });

        // --- BANCO DE DADOS ---
        async function salvarChat() {
            if (currentUser) {
                await setDoc(doc(db, "chats", currentUser.uid), { messages: chatHistory });
            }
        }

        async function carregarHistorico() {
            const docSnap = await getDoc(doc(db, "chats", currentUser.uid));
            if (docSnap.exists()) {
                chatHistory = docSnap.data().messages;
                document.getElementById("chat-container").innerHTML = '';
                chatHistory.forEach(msg => {
                    if (msg.role !== "system") appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
                });
            } else {
                chatHistory = [{ role: "system", content: systemPrompt }];
                appendMessage("ai", "E aí, mano! Sou o Migs. Como posso te ajudar hoje?");
            }
        }

        // --- LÓGICA DO CHAT ---
        window.sendMessage = async () => {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.7 })
                });

                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: aiRes });
                appendMessage("ai", aiRes);
                salvarChat(); // Salva no Firebase
            } catch (e) {
                appendMessage("ai", "Vixe, o sinal caiu, brother.");
            }
        };

        function appendMessage(sender, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            div.innerHTML = marked.parse(text);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            div.querySelectorAll('img').forEach(img => { if (!img.classList.contains('logo-img')) img.classList.add('chat-img'); });
        }

        window.handleKeyPress = (e) => { if (e.key === "Enter") window.sendMessage(); };
    </script>
</body>
</html>
