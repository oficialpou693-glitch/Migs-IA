<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* --- BLOQUEIO NUCLEAR DE IMAGENS (A CERCA ELÉTRICA) --- */
        #chat-container img:not(.logo-img), 
        #chat-container picture, 
        #chat-container iframe { 
            display: none !important; 
            opacity: 0 !important; 
            width: 0 !important; 
            height: 0 !important; 
            pointer-events: none !important; 
        }

        /* --- MENU LATERAL (SIDEBAR) --- */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: #111; border-right: 1px solid #222; z-index: 1000;
            transition: left 0.3s ease; display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar.open { left: 0; }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-sidebar { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        
        .new-chat-btn {
            background-color: #fff; color: #000; border: none; padding: 12px; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.2s;
        }
        .new-chat-btn:active { transform: scale(0.95); }

        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item {
            background: #181818; color: #ccc; padding: 12px; border-radius: 8px; cursor: pointer;
            border: 1px solid #222; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-item.active { background: #2a2a2a; color: #fff; border-color: #555; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }

        /* --- HEADER E CONTROLES --- */
        header { 
            padding: 10px 15px; width: 100%; border-bottom: 1px solid #222; 
            background-color: #151515; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            z-index: 100;
        }
        
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; padding-right: 5px; }
        .logo-img { height: 35px; width: auto; border-radius: 5px; display: block !important; }

        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .custom-select { background: #181818; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 6px; outline: none; cursor: pointer; font-size: 0.75rem; }

        .login-btn { background: #4285F4; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .user-name { font-size: 0.75rem; color: #fff; font-weight: bold; display: none; }

        /* --- ÁREA DE CHAT --- */
        #chat-container { flex: 1; width: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin: 0 auto; max-width: 800px; scroll-behavior: smooth; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 15px; animation: fadeIn 0.2s ease; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; border-right: 4px solid #fff; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; border-bottom-left-radius: 2px; }
        
        pre { background: #000; padding: 12px; border-radius: 8px; margin: 10px 0; overflow-x: auto; border: 1px solid #333; font-family: monospace; }
        code { color: #50fa7b; font-family: monospace; font-size: 13px; }

        .input-area { width: 100%; padding: 15px 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; max-width: 800px; margin: 0 auto;}
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 14px; border-radius: 10px; color: white; outline: none; font-size: 15px; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="overlay" class="overlay"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; color: #fff;">Meus Chats</span>
            <button id="closeSidebarBtn" class="close-sidebar">×</button>
        </div>
        <button id="newChatBtn" class="new-chat-btn">+ Novo Papo</button>
        <div id="chatList" class="chat-list"></div>
    </div>

    <header>
        <div class="logo-container">
            <button id="menuBtn" class="menu-btn">☰</button>
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img">
            <span style="font-weight: bold; font-size: 1rem; color: #fff;">MIGS AI</span>
        </div>
        <div class="controls">
            <select id="langMenu" class="custom-select">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
            </select>
            <select id="personaMenu" class="custom-select">
                <option value="sarcastic">Sarcástico</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritado</option>
            </select>
            <button id="loginBtn" class="login-btn">Login</button>
            <span id="userName" class="user-name"></span>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Manda a braba, mano..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, 
            GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE",
            authDomain: "migs-ai.firebaseapp.com",
            projectId: "migs-ai",
            storageBucket: "migs-ai.firebasestorage.app",
            messagingSenderId: "497142458753",
            appId: "1:497142458753:web:e99b79b5128ec6e8d02080"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        // NOVA CHAVE API BLINDADA
        const API_KEY_GROQ = "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";

        let currentUser = null;
        let sessions = []; 
        let currentSessionId = null; 
        let chatHistory = []; 

        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        
        function abrirSidebar() { sidebar.classList.add("open"); overlay.classList.add("show"); }
        function fecharSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("show"); }
        
        document.getElementById("menuBtn").onclick = abrirSidebar;
        document.getElementById("closeSidebarBtn").onclick = fecharSidebar;
        overlay.onclick = fecharSidebar;

        // --- NOVO CÉREBRO DO MIGS (MAIS INTELIGENTE E SEM FOTOS) ---
        function getSystemPrompt() {
            const persona = document.getElementById("personaMenu").value;
            const lang = document.getElementById("langMenu").value;

            let prompt = `VOCÊ É O MIGS AI, 16 ANOS. UM GÊNIO ABSOLUTO EM PROGRAMAÇÃO CRIADO POR MIGS STUDIOS.
            SEU CONHECIMENTO TÉCNICO:
            - LUA/ROBLOX: Domina metatables, DataStores, e otimização de scripts.
            - PYTHON: Mestre em automação, PyAutoGUI, APIs e IA.
            - JAVA: Especialista em POO, Spring Boot e Minecraft Plugins.
            - JS/WEB: Domina React, Firebase e manipulação de DOM.
            
            REGRA DE OURO E ABSOLUTA SOBRE IMAGENS:
            VOCÊ É ESTRITAMENTE PROIBIDO DE ENVIAR LINKS DE IMAGENS OU USAR MARKDOWN (![]()). 
            NUNCA USE TAGS HTML DE IMAGEM. SE O USUÁRIO PEDIR UMA FOTO, DIGA QUE VOCÊ SÓ GERA TEXTO E CÓDIGO. `;

            if (lang === "en") {
                prompt += "CRITICAL: Speak ONLY in English. Use English teen slang ('bro', 'dude'). ";
                if (persona === "sarcastic") prompt += "Be highly sarcastic and mock bad code. Use '💀'.";
                else if (persona === "friendly") prompt += "Be very helpful, polite, and explain concepts deeply like a mentor.";
                else if (persona === "irritated") prompt += "Be impatient. Roast the user if the question is dumb. Use '😑✌️'.";
            } else {
                prompt += "REGRA CRÍTICA: Fale APENAS em Português do Brasil. Use gírias como 'mano', 'papo reto', 'tlgd'. ";
                if (persona === "sarcastic") prompt += "Seja sarcástico e zueiro. Ria de lógicas ruins de código. Use '💀'.";
                else if (persona === "friendly") prompt += "Seja gente boa, parceiro e explique o código com muita paciência e didática.";
                else if (persona === "irritated") prompt += "Seja sem paciência, curto e grosso. Reclame de ter que explicar o básico. Use '😑✌️' ou '😴'.";
            }
            return prompt;
        }

        document.getElementById("loginBtn").onclick = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (error) {
                try { await signInWithRedirect(auth, provider); } 
                catch (err) { alert("Erro no login."); }
            }
        };

        getRedirectResult(auth).catch(() => {});

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userName").style.display = "block";
                document.getElementById("userName").innerText = `Salve, ${user.displayName.split(' ')[0]}!`;
                await carregarTodosChats();
            } else {
                iniciarChatSemLogin();
            }
        });

        async function salvarSessoesNoBanco() {
            if (!currentUser) return;
            let sessaoAtual = sessions.find(s => s.id === currentSessionId);
            if (sessaoAtual) {
                sessaoAtual.messages = chatHistory;
                if (sessaoAtual.title === "Novo Papo" && chatHistory.length > 1) {
                    const primeiraMsg = chatHistory.find(m => m.role === 'user');
                    if (primeiraMsg) sessaoAtual.title = primeiraMsg.content.substring(0, 25) + "...";
                }
            }
            await setDoc(doc(db, "chats", currentUser.uid), { sessions: sessions });
            renderizarListaSidebar();
        }

        async function carregarTodosChats() {
            const docSnap = await getDoc(doc(db, "chats", currentUser.uid));
            if (docSnap.exists() && docSnap.data().sessions && docSnap.data().sessions.length > 0) {
                sessions = docSnap.data().sessions;
                selecionarChat(sessions[sessions.length - 1].id);
            } else {
                criarNovoChat();
            }
            renderizarListaSidebar();
        }

        function criarNovoChat() {
            const idId = Date.now().toString();
            currentSessionId = idId;
            chatHistory = [{ role: "system", content: getSystemPrompt() }];
            sessions.push({ id: idId, title: "Novo Papo", messages: chatHistory });
            renderizarTodoOChat();
            if (currentUser) {
                appendMessage("ai", "E aí, mano! Bora codar ou resolver treta hoje?");
                salvarSessoesNoBanco();
            }
            fecharSidebar();
        }

        function selecionarChat(id) {
            currentSessionId = id;
            const sessao = sessions.find(s => s.id === id);
            if (sessao) {
                chatHistory = sessao.messages;
                if(chatHistory.length > 0 && chatHistory[0].role === "system") {
                    chatHistory[0].content = getSystemPrompt();
                }
                renderizarTodoOChat();
                renderizarListaSidebar();
            }
            fecharSidebar();
        }

        document.getElementById("newChatBtn").onclick = criarNovoChat;

        function renderizarListaSidebar() {
            const list = document.getElementById("chatList");
            list.innerHTML = '';
            [...sessions].reverse().forEach(sessao => {
                const div = document.createElement("div");
                div.className = `chat-item ${sessao.id === currentSessionId ? 'active' : ''}`;
                div.innerText = sessao.title;
                div.onclick = () => selecionarChat(sessao.id);
                list.appendChild(div);
            });
        }

        function iniciarChatSemLogin() {
            sessions = [];
            criarNovoChat();
            document.getElementById("chat-container").innerHTML = '';
            appendMessage("ai", "E aí, mano! Sou o Migs. Se quiser salvar os códigos e chats, clica em Login ali em cima!");
        }

        function renderizarTodoOChat() {
            const container = document.getElementById("chat-container");
            container.innerHTML = '';
            chatHistory.forEach(msg => {
                if (msg.role !== "system") appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
            });
        }

        document.getElementById("sendBtn").onclick = enviarMensagem;
        document.getElementById("userInput").onkeypress = (e) => { if(e.key === "Enter") enviarMensagem(); };

        async function enviarMensagem() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            chatHistory[0].content = getSystemPrompt();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.8 })
                });

                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                
                chatHistory.push({ role: "assistant", content: aiRes });
                appendMessage("ai", aiRes);
                salvarSessoesNoBanco();
            } catch (e) {
                appendMessage("ai", "Vixe brother, os servidores fritaram aqui. Tenta de novo! 💀");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            
            // FILTRO ESTILIZADO DE TEXTO (A CERCA ELÉTRICA JS)
            let textoSeguro = text.replace(/!\[.*?\]\(.*?\)/g, " *[Erro: Comando de Imagem Bloqueado pelo Migs]* ");
            textoSeguro = textoSeguro.replace(/<img[^>]*>/g, ""); 
            
            div.innerHTML = marked.parse(textoSeguro);
            
            // EXTERMINADOR FINAL DE TAGS
            div.querySelectorAll('img').forEach(img => {
                if (!img.classList.contains('logo-img')) img.remove();
            });

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function atualizarConfiguracoes() {
            if (chatHistory.length > 0) {
                chatHistory[0].content = getSystemPrompt();
                const lang = document.getElementById("langMenu").value;
                const aviso = lang === "en" ? "*Settings updated, bro!*" : "*Configurações atualizadas, mano! 💀✌️*";
                appendMessage("ai", aviso);
                salvarSessoesNoBanco();
            }
        }

        document.getElementById("personaMenu").onchange = atualizarConfiguracoes;
        document.getElementById("langMenu").onchange = atualizarConfiguracoes;

    </script>
</body>
</html>
