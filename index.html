<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        header { 
            padding: 10px 20px; 
            width: 100%; 
            border-bottom: 1px solid #222; 
            background-color: #151515; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-container { display: flex; align-items: center; }
        .logo-img { height: 50px; width: auto; filter: brightness(1.1); }

        .menus { display: flex; gap: 10px; }
        .custom-select {
            background: #181818; color: #fff; border: 1px solid #333; padding: 8px 12px;
            border-radius: 6px; outline: none; cursor: pointer; font-size: 0.85rem;
        }

        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; color: #fff; border-bottom-right-radius: 2px; border-right: 3px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; border-bottom-left-radius: 2px; }
        
        img.chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; display: block; }

        .input-area { width: 100%; max-width: 750px; padding: 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img">
        </div>
        <div class="menus">
            <select id="langMenu" class="custom-select" onchange="changeLanguage()">
                <option value="pt">PT-BR</option>
                <option value="en">EN-US</option>
            </select>
            <select id="personaMenu" class="custom-select" onchange="changePersona()">
                <option value="sarcastic">Sarcástica</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritada</option>
            </select>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Manda a real..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const API_KEY = "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";
        let currentLang = "pt";

        // Mudei para uma API de busca de imagens que não tem fila
        const basePrompt = "Você é o Migs AI. Garoto de 16 anos, gírias 'brother' e 'mano'. REGRA DE IMAGEM: Se pedirem imagem, responda APENAS com: ![Image](https://api.qrserver.com/v1/create-qr-code/?size=1x1&data=IGNORE) e logo abaixo: ![Image](https://loremflickr.com/1080/1080/DESCRIPTION). Substitua DESCRIPTION pelo que o usuário pediu em inglês.";

        const personas = {
            sarcastic: basePrompt + " Persona: Sarcástica.",
            friendly: basePrompt + " Persona: Amigável.",
            irritated: basePrompt + " Persona: Irritada."
        };

        let chatHistory = [];

        function changeLanguage() { currentLang = document.getElementById("langMenu").value; changePersona(); }

        function changePersona() {
            const persona = document.getElementById("personaMenu").value;
            chatHistory = [{ role: "system", content: personas[persona] + (currentLang === "en" ? " Speak English." : " Fale Português.") }];
            document.getElementById("chat-container").innerHTML = '';
            appendMessage("ai", currentLang === "pt" ? "E aí, mano! Fala o que tu quer." : "Yo! Tell me what you want.");
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.7 })
                });

                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: aiRes });
                appendMessage("ai", aiRes);
            } catch (e) {
                appendMessage("ai", "Vixe, deu ruim aqui.");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            
            // Adiciona uma semente aleatória para o LoremFlickr não repetir a foto
            const final = text.replace(/loremflickr.com\/1080\/1080\/([^)]+)/g, (m, p1) => `loremflickr.com/1080/1080/${p1}?lock=${Math.floor(Math.random()*999)}`);
            
            div.innerHTML = marked.parse(final);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            div.querySelectorAll('img').forEach(img => {
                if (!img.classList.contains('logo-img')) img.classList.add('chat-img');
            });
        }

        function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
        window.onload = () => changeLanguage();
    </script>
</body>
</html>
