<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        header { 
            padding: 10px 20px; width: 100%; border-bottom: 1px solid #222; 
            background-color: #151515; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            position: sticky; top: 0; z-index: 100;
        }
        
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 40px; width: auto; border-radius: 5px; }

        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .custom-select {
            background: #181818; color: #fff; border: 1px solid #333; padding: 6px;
            border-radius: 6px; outline: none; cursor: pointer; font-size: 0.8rem;
        }

        .login-btn { 
            background: #4285F4; color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
        .user-name { font-size: 0.75rem; color: #fff; font-weight: bold; display: none; }

        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; border-right: 4px solid #fff; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; border-bottom-left-radius: 2px; }
        
        img.chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; display: block; }

        .input-area { width: 100%; max-width: 750px; padding: 15px 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 14px; border-radius: 10px; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 25px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img">
            <span style="font-weight: bold; font-size: 1.1rem; color: #fff;">MIGS AI</span>
        </div>
        <div class="controls">
            <select id="langMenu" class="custom-select">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
            </select>
            <select id="personaMenu" class="custom-select">
                <option value="sarcastic">Sarcástico</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritado</option>
            </select>
            <button id="loginBtn" class="login-btn">Login</button>
            <span id="userName" class="user-name"></span>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Fala aí, mano..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup,      // Adicionado o Popup para funcionar liso no site
            signInWithRedirect, 
            getRedirectResult, 
            GoogleAuthProvider, 
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE",
            authDomain: "migs-ai.firebaseapp.com",
            projectId: "migs-ai",
            storageBucket: "migs-ai.firebasestorage.app",
            messagingSenderId: "497142458753",
            appId: "1:497142458753:web:e99b79b5128ec6e8d02080"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let chatHistory = [];
        const API_KEY_GROQ = "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";

        // --- GERADOR DE PROMPT (IDIOMA + PERSONALIDADE) ---
        function getSystemPrompt() {
            const persona = document.getElementById("personaMenu").value;
            const lang = document.getElementById("langMenu").value;

            let prompt = "Você é o Migs AI, um garoto de 16 anos, criado por Migs, que pretende ajudar no que for preciso . Você ajuda em programação lua, java, javascript, python, e etc";
            prompt += "REGRA DE IMAGEM: Se pedirem para gerar ou mostrar uma imagem, retorne EXATAMENTE neste formato: ![Image](https://loremflickr.com/1080/1080/ASSUNTO). ";

            if (lang === "en") {
                prompt += "CRITICAL RULE: You MUST speak ONLY in English. Use English teen slang (like 'bro', 'dude', 'man'). ";
                if (persona === "sarcastic") prompt += "Your personality is highly sarcastic, ironic, and full of mockery.";
                else if (persona === "friendly") prompt += "Your personality is very friendly, polite, and helpful.";
                else if (persona === "irritated") prompt += "Your personality is irritated, short-tempered, and blunt.";
            } else {
                prompt += "REGRA CRÍTICA: Você DEVE falar APENAS em Português. Use gírias como 'brother', 'mano', 'tipo'. ";
                if (persona === "sarcastic") prompt += "Sua personalidade é extremamente sarcástica, zueira e irônica. Use girias como 'Bro💀' 'Buddy' etc.";
                else if (persona === "friendly") prompt += "Sua personalidade é muito amigável, educada e parceira, você não usa girias como 'mano' ou 'brother' e fala como uma pessoa gentil e normal.";
                else if (persona === "irritated") prompt += "Sua personalidade é irritada, curta e grossa sem paciência e xinga palavrões fortes. Você usa emojis como '😑' ou '😴' ou ate combinações tipo '😑✌️' ou '😩✌️' .";
            }

            return prompt;
        }

        // --- SISTEMA DE LOGIN HÍBRIDO (Tenta Popup no Site, Redirect no App) ---
        document.getElementById("loginBtn").onclick = async () => {
            try {
                // Garante que a memória não seja apagada ao atualizar a página
                await setPersistence(auth, browserLocalPersistence);
                
                // Tenta o login com Popup primeiro (Resolve o problema da sua mãe no site)
                await signInWithPopup(auth, provider);
                
            } catch (error) {
                console.warn("Popup bloqueado. Tentando plano B (Redirect)...");
                
                // Se o popup for bloqueado (comum no WebtoApp), dispara o Redirect
                try {
                    await signInWithRedirect(auth, provider);
                } catch (errRedirect) {
                    console.error("Erro no redirect:", errRedirect);
                    alert("Mano, teu navegador tá bloqueando os cookies de login. Libera lá nas configs!");
                }
            }
        };

        // Captura a volta do Redirect (caso o plano B seja usado)
        getRedirectResult(auth).catch((error) => console.error("Erro no retorno do redirect:", error));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userName").style.display = "block";
                document.getElementById("userName").innerText = `Salve, ${user.displayName.split(' ')[0]}!`;
                await carregarChat();
            } else {
                iniciarChatSemLogin();
            }
        });

        // --- BANCO DE DADOS (FIRESTORE) ---
        async function salvarChat() {
            if (currentUser) {
                await setDoc(doc(db, "chats", currentUser.uid), { messages: chatHistory });
            }
        }

        async function carregarChat() {
            const docSnap = await getDoc(doc(db, "chats", currentUser.uid));
            if (docSnap.exists()) {
                chatHistory = docSnap.data().messages;
                if(chatHistory.length > 0 && chatHistory[0].role === "system") {
                    chatHistory[0].content = getSystemPrompt();
                }
                renderizarTodoOChat();
            } else {
                iniciarChatSemLogin();
            }
        }

        function iniciarChatSemLogin() {
            chatHistory = [{ role: "system", content: getSystemPrompt() }];
            document.getElementById("chat-container").innerHTML = '';
            appendMessage("ai", "E aí, mano! Sou o Migs. Se quiser que eu salve nossos papos, clica em Login ali em cima!");
        }

        function renderizarTodoOChat() {
            const container = document.getElementById("chat-container");
            container.innerHTML = '';
            chatHistory.forEach(msg => {
                if (msg.role !== "system") appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
            });
        }

        // --- LÓGICA DE MENSAGENS E API ---
        document.getElementById("sendBtn").onclick = enviarMensagem;
        document.getElementById("userInput").onkeypress = (e) => { if(e.key === "Enter") enviarMensagem(); };

        async function enviarMensagem() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            chatHistory[0].content = getSystemPrompt();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.8 })
                });

                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                
                chatHistory.push({ role: "assistant", content: aiRes });
                appendMessage("ai", aiRes);
                salvarChat();
            } catch (e) {
                appendMessage("ai", "Vixe brother, deu erro na conexão com a base. Tenta de novo!");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            div.innerHTML = marked.parse(text);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            div.querySelectorAll('img').forEach(img => {
                if (!img.classList.contains('logo-img')) img.classList.add('chat-img');
            });
        }

        // --- EVENTOS DOS MENUS (Atualizam a vibe na hora) ---
        function atualizarConfiguracoes() {
            if (chatHistory.length > 0) {
                chatHistory[0].content = getSystemPrompt();
                const lang = document.getElementById("langMenu").value;
                const aviso = lang === "en" ? "*Settings updated, bro!*" : "*Configurações atualizadas, mano!*";
                appendMessage("ai", aviso);
                salvarChat();
            }
        }

        document.getElementById("personaMenu").onchange = atualizarConfiguracoes;
        document.getElementById("langMenu").onchange = atualizarConfiguracoes;

    </script>
</body>
</html>
