<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | By Migs</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        header { 
            padding: 15px 20px; 
            width: 100%; 
            border-bottom: 1px solid #222; 
            background-color: #151515; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 { color: #ffffff; font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; }
        .menus { display: flex; gap: 10px; }
        .custom-select {
            background: #181818; color: #fff; border: 1px solid #333; padding: 8px 12px;
            border-radius: 6px; outline: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
        }
        .custom-select:hover { border-color: #fff; }

        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease forwards; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background-color: #2a2a2a; color: #ffffff; border-bottom-right-radius: 2px; border-right: 3px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; color: #d1d1d1; border: 1px solid #252525; border-bottom-left-radius: 2px; width: 100%; }
        
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; display: block; background: #000; }

        pre { 
            background: #000; padding: 40px 15px 15px 15px; border-radius: 8px; 
            overflow-x: auto; margin: 15px 0; border: 1px solid #333; position: relative; 
        }
        code { font-family: 'Courier New', Courier, monospace; color: #ff79c6; }
        .copy-btn {
            position: absolute; top: 5px; right: 5px; background: #2a2a2a; color: #fff;
            border: 1px solid #444; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
        }

        .input-area { width: 100%; max-width: 750px; padding: 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 15px; }
        .send-btn { background: #f0f0f0; color: #000; border: none; padding: 0 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MIGS AI</h1>
        <div class="menus">
            <select id="langMenu" class="custom-select" onchange="changeLanguage()">
                <option value="pt">PT-BR</option>
                <option value="en">EN-US</option>
            </select>
            <select id="personaMenu" class="custom-select" onchange="changePersona()">
                <option value="sarcastic">Sarcástica</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritada</option>
            </select>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="escreva o que quiser" onkeypress="handleKeyPress(event)">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const API_KEY = "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";
        let currentLang = "pt";

        const uiText = {
            pt: { placeholder: "Escreva o que quiser...", send: "Enviar", copy: "Copiar", copied: "Copiado!", typing: "Processando...", error: "Erro na Groq.", msgs: { sarcastic: "Fala aí, chefe.", friendly: "Como posso ajudar, mano? ✨", irritated: "Fala logo, tô ocupada." } },
            en: { placeholder: "Type something...", send: "Send", copy: "Copy", copied: "Copied!", typing: "Processing...", error: "Groq Error.", msgs: { sarcastic: "What's up, boss.", friendly: "How can I help you, bro? ✨", irritated: "Be quick, I'm busy." } }
        };

        const basePrompt = "Você é a Migs AI. Tem 16 anos, usa gírias como 'brother' e 'mano'. Tutora sênior de programação. REGRA DE IMAGEM: Se pedirem foto/desenho/imagem, responda APENAS com o Markdown: ![Image](https://image.pollinations.ai/prompt/DESCRIPTION?width=1080&height=1080&nologo=true&seed=RAND). Substitua DESCRIPTION por termos em inglês com hífens e RAND por um número aleatório. Não fale nada além do link.";

        const personas = {
            sarcastic: basePrompt + " Persona: Sarcástica e brother.",
            friendly: basePrompt + " Persona: Gentil e amigável.",
            irritated: basePrompt + " Persona: Irritada mas entrega o código certo."
        };

        let chatHistory = [];

        window.onload = () => { changeLanguage(); };

        function changeLanguage() {
            currentLang = document.getElementById("langMenu").value;
            document.getElementById("userInput").placeholder = uiText[currentLang].placeholder;
            document.getElementById("sendBtn").innerText = uiText[currentLang].send;
            changePersona();
        }

        function changePersona() {
            const persona = document.getElementById("personaMenu").value;
            let langInst = currentLang === "en" ? " Speak ENGLISH." : " Fale PORTUGUÊS.";
            chatHistory = [{ role: "system", content: personas[persona] + langInst }];
            document.getElementById("chat-container").innerHTML = '';
            appendMessage("ai", uiText[currentLang].msgs[persona]);
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            const loadingId = "loading-" + Date.now();
            appendMessage("ai", uiText[currentLang].typing, loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.8 })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.choices?.[0]?.message) {
                    const aiRes = data.choices[0].message.content;
                    chatHistory.push({ role: "assistant", content: aiRes });
                    appendMessage("ai", aiRes);
                }
            } catch (e) {
                document.getElementById(loadingId)?.remove();
                appendMessage("ai", uiText[currentLang].error);
            }
        }

        function appendMessage(sender, text, id = null) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            if (id) div.id = id;

            if (sender === "ai" && !id) {
                // Força um seed aleatório novo em cada renderização
                const processedText = text.replace(/seed=RAND/g, `seed=${Math.floor(Math.random() * 99999)}`);
                div.innerHTML = marked.parse(processedText);
                
                div.querySelectorAll('pre').forEach(pre => {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = uiText[currentLang].copy;
                    btn.onclick = () => {
                        navigator.clipboard.writeText(pre.querySelector('code').innerText);
                        btn.innerText = uiText[currentLang].copied;
                        setTimeout(() => btn.innerText = uiText[currentLang].copy, 2000);
                    };
                    pre.appendChild(btn);
                });
            } else {
                div.innerText = text;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
    </script>
</body>
            </html>
