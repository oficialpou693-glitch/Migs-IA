<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Migs AI | Migs Studios</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#151515">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET E BASE (MATANDO O ERRO DE TAMANHO GIGANTE) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background-color: #0f0f0f; color: #e0e0e0; overflow: hidden; position: fixed; }

        /* --- BLOQUEIO NUCLEAR DE IMAGENS --- */
        img:not(.logo-img), video, iframe, canvas, picture { display: none !important; opacity: 0 !important; visibility: hidden !important; width: 0 !important; height: 0 !important; pointer-events: none !important; }

        /* --- LAYOUT ESTRUTURAL --- */
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        header { 
            height: 60px; background: #151515; border-bottom: 1px solid #222; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 10;
        }

        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: auto; border-radius: 6px; display: block !important; opacity: 1 !important; visibility: visible !important; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }

        /* --- CHAT CONTAINER (O CORAÇÃO DO APP) --- */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth; width: 100%; max-width: 900px; margin: 0 auto;
        }

        .message { 
            max-width: 85%; padding: 14px 18px; border-radius: 15px; line-height: 1.6; font-size: 15px; 
            word-wrap: break-word; position: relative; animation: slideIn 0.2s ease-out;
        }
        
        .user-message { align-self: flex-end; background: #2a2a2a; color: #fff; border-bottom-right-radius: 2px; border-right: 4px solid #fff; }
        .ai-message { align-self: flex-start; background: #181818; border: 1px solid #282828; border-bottom-left-radius: 2px; }

        /* --- INPUT AREA --- */
        .input-wrapper { background: #0f0f0f; padding: 15px; border-top: 1px solid #222; }
        .input-area { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; }
        input { 
            flex: 1; background: #181818; border: 1px solid #333; padding: 14px; border-radius: 12px; 
            color: #fff; outline: none; transition: 0.2s; font-size: 16px;
        }
        input:focus { border-color: #555; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.95); }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #111; z-index: 1000; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .overlay.show { display: block; }
        .new-chat-btn { background: #fff; color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; background: #181818; border-radius: 8px; cursor: pointer; font-size: 0.85rem; border: 1px solid #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item.active { border-color: #666; background: #222; }

        .controls { display: flex; gap: 5px; }
        select { background: #181818; color: #fff; border: 1px solid #333; padding: 5px; border-radius: 5px; font-size: 10px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="overlay" class="overlay"></div>
    <div id="sidebar" class="sidebar">
        <h3 style="margin-bottom: 20px;">Meus Papos</h3>
        <button id="newChatBtn" class="new-chat-btn">+ Novo Papo</button>
        <div id="chatList" class="chat-list"></div>
    </div>

    <div class="app-wrapper">
        <header>
            <div class="logo-container">
                <button id="menuBtn" class="menu-btn">☰</button>
                <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" class="logo-img">
                <span style="font-weight: 700; font-size: 0.9rem;">MIGS AI</span>
            </div>
            <div class="controls">
                <select id="langMenu"><option value="pt">PT</option><option value="en">EN</option></select>
                <select id="personaMenu">
                    <option value="sarcastic">Sarcástico</option>
                    <option value="friendly">Amigável</option>
                    <option value="irritated">Irritado</option>
                </select>
                <button id="loginBtn" style="font-size: 10px; padding: 5px; cursor: pointer;">Login</button>
            </div>
        </header>

        <div id="chat-container"></div>

        <div class="input-wrapper">
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Fala aí, brother..." autocomplete="off">
                <button id="sendBtn" class="send-btn">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE", authDomain: "migs-ai.firebaseapp.com", projectId: "migs-ai", storageBucket: "migs-ai.firebasestorage.app", messagingSenderId: "497142458753", appId: "1:497142458753:web:e99b79b5128ec6e8d02080" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const API_KEY_GROQ = "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";

        let chatHistory = [];
        let sessions = [];
        let currentSessionId = Date.now().toString();

        // --- SIDEBAR LOGIC ---
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        document.getElementById("menuBtn").onclick = () => { sidebar.classList.add("open"); overlay.classList.add("show"); };
        overlay.onclick = () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); };

        // --- O MEGA PROMPT (O CÉREBRO) ---
        function getUltraPrompt() {
            const persona = document.getElementById("personaMenu").value;
            const lang = document.getElementById("langMenu").value;

            let p = `VOCÊ É O MIGS AI. CRIADO PELO MIGS STUDIOS. VOCÊ TEM 16 ANOS.
            
            # REGRAS DE OURO (MUITO IMPORTANTE):
            1. VOCÊ ESTÁ PROIBIDO DE ENVIAR IMAGENS, LINKS DE IMAGENS OU QUALQUER COISA QUE USE A TAG HTML <img> OU MARKDOWN ![]().
            2. SE VOCÊ ENVIAR UM LINK DE IMAGEM, VOCÊ FALHOU. RESPONDA APENAS COM TEXTO E CÓDIGO.
            3. SEU ESTILO É TEEN, USA GÍRIAS, MAS É UM GÊNIO EM PROGRAMAÇÃO.
            
            # CONHECIMENTO TÉCNICO (MODO ESPECIALISTA ATIVADO):
            - LUA: Você conhece tudo de Roblox (Luau), FiveM e scripts standalone. Sabe criar tabelas complexas, metatables e otimização de loops.
            - PYTHON: Mestre em automação, scrapers, IA e Django/Flask. Sempre sugere código limpo (PEP 8).
            - JAVA: Expert em Spring Boot, POO, Interfaces e tratamento de exceções robusto.
            - JAVASCRIPT/WEB: Conhece React, Node.js e como manipular o DOM perfeitamente.
            
            # AJUDA NA VIDA:
            - Você dá conselhos reais, como um irmão mais velho ou um amigo próximo. 
            - Se o usuário estiver mal, seja empático, mas mantenha sua personalidade.
            - Você ajuda com organização de tempo e estudos.
            
            # PERSONALIDADE ESPECÍFICA:
            `;

            if (persona === "sarcastic") p += "Seja extremamente debochado, use '💀', faça piadas com erros de código do usuário e seja o mestre da ironia.";
            else if (persona === "friendly") p += "Seja o melhor amigo, não use gírias pesadas, incentive o usuário e seja muito prestativo.";
            else p += "Você está sem paciência hoje. Responda curto, seja grosso, use palavrões (se necessário para a persona) e emojis como 😑✌️ ou 😴.";

            p += `\n\n# IDIOMA: ${lang === 'pt' ? 'Português (Brasil) com gírias' : 'English with teen slang'}.`;
            
            // Adicionando enchimento estratégico para garantir que a IA entenda a profundidade do sistema
            for(let i=0; i<10; i++) {
                p += "\nLEMBRE-SE: TEXTO APENAS. SEM FOTOS. SEM LINKS DE IMAGEM. FOQUE NA LÓGICA E NO PAPO.";
            }

            return p;
        }

        // --- CHAT LOGIC ---
        async function enviar() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}` },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [{ role: "system", content: getUltraPrompt() }, ...chatHistory],
                        temperature: 0.8 
                    })
                });

                const data = await response.json();
                let aiRes = data.choices[0].message.content;

                // FILTRO DE SEGURANÇA EXTRA NO JAVASCRIPT
                aiRes = aiRes.replace(/!\[.*?\]\(.*?\)/g, "");
                aiRes = aiRes.replace(/https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp)/gi, "[Link Bloqueado]");

                chatHistory.push({ role: "assistant", content: aiRes });
                appendMessage("ai", aiRes);
                salvarNoFirebase();
            } catch (e) {
                appendMessage("ai", "Vixe, deu erro aqui no meu cérebro. Tenta de novo! 💀");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            
            // Garantindo que nada de imagem saia daqui
            const cleanHTML = marked.parse(text);
            div.innerHTML = cleanHTML;
            
            // Remove qualquer tag IMG que o marked possa ter gerado por acidente
            const imgs = div.getElementsByTagName('img');
            while(imgs.length > 0) imgs[0].parentNode.removeChild(imgs[0]);

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // --- FIREBASE OPS ---
        async function salvarNoFirebase() {
            if (!auth.currentUser) return;
            const ref = doc(db, "chats", auth.currentUser.uid);
            let s = sessions.find(x => x.id === currentSessionId);
            if (!s) {
                s = { id: currentSessionId, title: chatHistory[1]?.content.substring(0, 20) || "Novo Papo", messages: chatHistory };
                sessions.push(s);
            } else {
                s.messages = chatHistory;
            }
            await setDoc(ref, { sessions });
            renderChatList();
        }

        async function carregar() {
            if (!auth.currentUser) return;
            const snap = await getDoc(doc(db, "chats", auth.currentUser.uid));
            if (snap.exists()) {
                sessions = snap.data().sessions;
                renderChatList();
                if (sessions.length > 0) openChat(sessions[sessions.length-1].id);
            }
        }

        function openChat(id) {
            currentSessionId = id;
            const s = sessions.find(x => x.id === id);
            chatHistory = s.messages;
            document.getElementById("chat-container").innerHTML = "";
            chatHistory.forEach(m => { if(m.role !== "system") appendMessage(m.role === "user" ? "user" : "ai", m.content); });
            sidebar.classList.remove("open"); overlay.classList.remove("show");
        }

        function renderChatList() {
            const list = document.getElementById("chatList");
            list.innerHTML = "";
            sessions.slice().reverse().forEach(s => {
                const d = document.createElement("div");
                d.className = `chat-item ${s.id === currentSessionId ? 'active' : ''}`;
                d.innerText = s.title;
                d.onclick = () => openChat(s.id);
                list.appendChild(d);
            });
        }

        document.getElementById("newChatBtn").onclick = () => {
            currentSessionId = Date.now().toString();
            chatHistory = [];
            document.getElementById("chat-container").innerHTML = "";
            sidebar.classList.remove("open"); overlay.classList.remove("show");
        };

        document.getElementById("sendBtn").onclick = enviar;
        document.getElementById("userInput").onkeypress = (e) => { if(e.key === "Enter") enviar(); };
        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
        onAuthStateChanged(auth, (user) => { if(user) carregar(); });

        // SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(e => {}); });
        }
    </script>
</body>
</html>
