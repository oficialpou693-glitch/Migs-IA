<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        header { 
            padding: 10px 20px; 
            width: 100%; 
            border-bottom: 1px solid #222; 
            background-color: #151515; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Ajuste do Logo no Canto */
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { 
            height: 35px; /* Altura ajustada para o cabeçalho */
            width: auto;
            border-radius: 4px;
            object-fit: contain;
        }

        .menus { display: flex; gap: 10px; }
        .custom-select {
            background: #181818; color: #fff; border: 1px solid #333; padding: 8px 12px;
            border-radius: 6px; outline: none; cursor: pointer; font-size: 0.9rem;
        }

        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease forwards; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background-color: #2a2a2a; color: #ffffff; border-bottom-right-radius: 2px; border-right: 3px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; color: #d1d1d1; border: 1px solid #252525; border-bottom-left-radius: 2px; width: 100%; }
        
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; background: #000; }

        .input-area { width: 100%; max-width: 750px; padding: 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 15px; }
        .send-btn { background: #f0f0f0; color: #000; border: none; padding: 0 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img" onerror="this.style.display='none'">
            <h1 style="font-size: 1.1rem; letter-spacing: 1px;">MIGS AI</h1>
        </div>
        <div class="menus">
            <select id="langMenu" class="custom-select" onchange="changeLanguage()">
                <option value="pt">PT-BR</option>
                <option value="en">EN-US</option>
            </select>
            <select id="personaMenu" class="custom-select" onchange="changePersona()">
                <option value="sarcastic">Sarcástica</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritada</option>
            </select>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="escreva o que quiser" onkeypress="handleKeyPress(event)">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const API_KEY = "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";
        let currentLang = "pt";

        // ... Restante do código (lógica de chat e personas) permanece o mesmo ...
        // Certifique-se de manter a regra de imagem do LoremFlickr para estabilidade!
        
        const basePrompt = "Você é a Migs AI da Migs Studios. Tem 16 anos, usa gírias como 'brother' e 'mano'. REGRA DE IMAGEM: Responda APENAS com o Markdown: ![Image](https://loremflickr.com/1080/1080/DESCRIPTION).";

        // Funções sendMessage, appendMessage, etc.
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;
            appendMessage("user", text);
            input.value = "";
            // Chamada da API Groq aqui...
        }
        
        function appendMessage(sender, text, id = null) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            if (id) div.id = id;
            if (sender === "ai" && !id) {
                div.innerHTML = marked.parse(text);
            } else {
                div.innerText = text;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
        function changeLanguage() { changePersona(); }
        function changePersona() { document.getElementById("chat-container").innerHTML = ''; }
        window.onload = () => { changePersona(); };
    </script>
</body>
</html>
