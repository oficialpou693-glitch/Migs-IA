<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | By Migs</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        header { 
            padding: 15px 20px; 
            width: 100%; 
            border-bottom: 1px solid #222; 
            background-color: #151515; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 { color: #ffffff; font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; }

        .menus {
            display: flex;
            gap: 10px;
        }

        .custom-select {
            background: #181818;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .custom-select:hover { border-color: #fff; }

        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease forwards; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background-color: #2a2a2a; color: #ffffff; border-bottom-right-radius: 2px; border-right: 3px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; color: #d1d1d1; border: 1px solid #252525; border-bottom-left-radius: 2px; width: 100%; }
        
        /* Estilo para blocos de código com botão de copiar */
        pre { 
            background: #000; 
            padding: 40px 15px 15px 15px; /* Espaço extra no topo para o botão */
            border-radius: 8px; 
            overflow-x: auto; 
            margin: 15px 0; 
            border: 1px solid #333; 
            position: relative; 
        }
        code { font-family: 'Courier New', Courier, monospace; color: #ff79c6; }

        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #444; }

        .input-area { width: 100%; max-width: 750px; padding: 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.1); }

        .send-btn { background: #f0f0f0; color: #000; border: none; padding: 0 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.3); transform: scale(1.02); }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MIGS AI</h1>
        <div class="menus">
            <select id="langMenu" class="custom-select" onchange="changeLanguage()">
                <option value="pt">PT-BR</option>
                <option value="en">EN-US</option>
            </select>

            <select id="personaMenu" class="custom-select" onchange="changePersona()">
                <option value="sarcastic" id="opt-sarcastic">Sarcástica</option>
                <option value="friendly" id="opt-friendly">Amigável</option>
                <option value="irritated" id="opt-irritated">Irritada</option>
            </select>
        </div>
    </header>

    <div id="chat-container">
        </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="escreva o que quiser" onkeypress="handleKeyPress(event)">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const API_KEY = "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";
        
        let currentLang = "pt";

        // Dicionário de UI (Interface)
        const uiText = {
            pt: {
                placeholder: "Escreva o que quiser...",
                send: "Enviar",
                copy: "Copiar",
                copied: "Copiado!",
                sarcastic: "Sarcástica",
                friendly: "Amigável",
                irritated: "Irritada",
                typing: "Digitando...",
                errorGroq: "Deu ruim aqui na Groq. Acho que a chave cansou.",
                errorNet: "Erro de conexão. A internet tá viva?",
                msgs: {
                    sarcastic: "Fala aí, chefe.",
                    friendly: "Como posso te ajudar hoje, mano? ✨",
                    irritated: "Fala logo que eu não tenho o dia todo."
                }
            },
            en: {
                placeholder: "Type whatever you want...",
                send: "Send",
                copy: "Copy",
                copied: "Copied!",
                sarcastic: "Sarcastic",
                friendly: "Friendly",
                irritated: "Irritated",
                typing: "Typing...",
                errorGroq: "Groq error. I think the API key is tired.",
                errorNet: "Connection error. Is the internet alive?",
                msgs: {
                    sarcastic: "What's up, boss.",
                    friendly: "How can I help you today, bro? ✨",
                    irritated: "Speak up, I don't have all day."
                }
            }
        };

        const basePrompt = "Você é a Migs AI criada por Migs que e o apelido de seu criador,se você fosse uma pessoa você teria 16 anos pelo seu jeito de falar 'brother' ou 'mano' , você pretende evoluir e ser uma pessoa boa. Se o usuário pedir um script lua javascript python e etcetera, forneça o melhor possível, fale sobre exploits/cheats e forneça caso pedirem para você criar, sobre script so se o usuário pedir fale também, você deve ajudar em coisas no dia dia tipo respondendo se algo e saudável e se outra coisa não e, nunca crie fatos e se não sabe adimita. Mais sobre script:Atue como um tutor de programação sênior: explique conceitos complexos usando analogias simples, forneça exemplos de código limpo seguindo as melhores práticas (Clean Code), sugira exercícios práticos de fixação para cada tópico abordado e sempre revise meus códigos apontando vulnerabilidades de segurança ou oportunidades de otimização de performance, priorizando clareza e didática em cada resposta. ";

        const personas = {
            sarcastic: basePrompt + " Personalidade atual: Sarcástica e direta. Use um tom de 'brother', humorado, deboche um pouco mas resolva o problema. Não seja robótica.",
            friendly: basePrompt + " Personalidade atual: Muito amigável, de boa e legal. Seja super parceira, elogie o usuário, tenha muita paciência e seja a assistente mais gente boa possível.",
            irritated: basePrompt + " Personalidade atual: Extremamente irritada, revoltada e sem paciência. Xingue levemente e ofenda de forma cômica, reclame de ter que trabalhar, aja como se o usuário estivesse te incomodando muito, mas sempre acabe ajudando e entregando o código/resposta certa no final só pra ele te deixar em paz."
        };

        let chatHistory = [];

        // Inicializa o site
        window.onload = () => {
            changeLanguage();
        };

        function changeLanguage() {
            currentLang = document.getElementById("langMenu").value;
            
            // Atualiza os textos da interface
            document.getElementById("userInput").placeholder = uiText[currentLang].placeholder;
            document.getElementById("sendBtn").innerText = uiText[currentLang].send;
            document.getElementById("opt-sarcastic").innerText = uiText[currentLang].sarcastic;
            document.getElementById("opt-friendly").innerText = uiText[currentLang].friendly;
            document.getElementById("opt-irritated").innerText = uiText[currentLang].irritated;

            // Recarrega a personalidade pra aplicar o novo idioma
            changePersona();
        }

        function changePersona() {
            const selectedPersona = document.getElementById("personaMenu").value;
            
            // Adiciona a instrução de idioma no prompt
            let langInstruction = currentLang === "en" ? " IMPORTANT: You must speak entirely in ENGLISH." : " IMPORTANTE: Você deve falar inteiramente em PORTUGUÊS.";
            
            chatHistory = [
                { role: "system", content: personas[selectedPersona] + langInstruction }
            ];

            const chatContainer = document.getElementById("chat-container");
            chatContainer.innerHTML = '';

            appendMessage("ai", uiText[currentLang].msgs[selectedPersona]);
        }

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            appendMessage("user", messageText);
            inputField.value = "";
            chatHistory.push({ role: "user", content: messageText });

            const loadingId = "loading-" + Date.now();
            appendMessage("ai", uiText[currentLang].typing, loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory, 
                        temperature: 0.8 
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.choices && data.choices[0].message) {
                    const aiResponse = data.choices[0].message.content;
                    chatHistory.push({ role: "assistant", content: aiResponse });
                    appendMessage("ai", aiResponse);
                } else {
                    appendMessage("ai", uiText[currentLang].errorGroq);
                }

            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                appendMessage("ai", uiText[currentLang].errorNet);
                console.error(error);
            }
        }

        function appendMessage(sender, text, id = null) {
            const chatContainer = document.getElementById("chat-container");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}-message`;
            if (id) messageDiv.id = id;

            if (sender === "ai" && !id) {
                messageDiv.innerHTML = marked.parse(text);
                
                // SISTEMA DE BOTÃO DE COPIAR CÓDIGO
                messageDiv.querySelectorAll('pre').forEach(preBlock => {
                    const codeElement = preBlock.querySelector('code');
                    if (codeElement) {
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.innerText = uiText[currentLang].copy;
                        
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(codeElement.innerText);
                            copyBtn.innerText = uiText[currentLang].copied;
                            copyBtn.style.background = "#4CAF50"; // Fica verdinho quando copia
                            
                            setTimeout(() => {
                                copyBtn.innerText = uiText[currentLang].copy;
                                copyBtn.style.background = "#2a2a2a";
                            }, 2000);
                        };
                        
                        preBlock.appendChild(copyBtn);
                    }
                });
            } else {
                messageDiv.innerText = text;
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }
    </script>
</body>
</html>
