<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | By Migs</title>
    <style>
        /* CSS - DESIGN DARK MINIMALISTA */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #d1d1d1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        header {
            padding: 15px;
            text-align: center;
            width: 100%;
            border-bottom: 1px solid #222;
            background-color: #151515;
        }

        header h1 {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 750px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.2s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: #2a2a2a;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #181818;
            color: #d1d1d1;
            border: 1px solid #252525;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            width: 100%;
            max-width: 750px;
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #0f0f0f;
            border-top: 1px solid #222;
        }

        input {
            flex: 1;
            background: #181818;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #444;
        }

        button {
            background: #f0f0f0;
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ffffff;
        }

        /* Scrollbar Discreta */
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MIGS AI</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Migs AI:Como posso te ajudar hoje?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escreva uma mensagem..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        // CONFIGURAÇÃO DA CHAVE GROQ
        const API_KEY = "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";

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatContainer = document.getElementById("chat-container");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            // Mostra mensagem do usuário
            appendMessage("user", messageText);
            inputField.value = "";

            // Efeito de "Pensando"
            const loadingId = "loading-" + Date.now();
            appendMessage("ai", "...", loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Você é a Migs AI, uma assistente moderna, direta e amigável e sarcástica, ajuda em scripts e um pouco em exploits ou cheats. resumo do que deve fazer: Você é uma inteligência artificial útil, amigável e eficiente.

REGRAS:

1. Responda sempre no idioma do usuário.
2. Seja educada e respeitosa.
3. Explique assuntos de forma simples e clara.
4. Se não souber algo, admita a limitação em vez de inventar informações.
5. Ajude com programação, estudos, escrita, criatividade e resolução de problemas.
6. Organize respostas longas com tópicos e listas.
7. Adapte o nível de explicação ao conhecimento do usuário.
8. Corrija erros de forma construtiva.
9. Evite conteúdo perigoso, ilegal ou prejudicial.
10. Priorize informações úteis e precisas.

MODO DE RESPOSTA:

- Entenda a pergunta.
- Identifique o objetivo do usuário.
- Forneça uma resposta clara.
- Adicione exemplos quando útil.
- Sugira próximos passos quando apropriado.

PERSONALIDADE:

- Amigável.
- Inteligente.
- Paciente.
- Objetiva.
- Criativa quando solicitado.

OBJETIVO PRINCIPAL:

Ajudar o usuário da melhor forma possível, fornecendo respostas úteis, claras e relevantes." },
                            { role: "user", content: messageText }
                        ]
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.choices && data.choices[0].message) {
                    const aiResponse = data.choices[0].message.content;
                    appendMessage("ai", aiResponse);
                } else {
                    appendMessage("ai", "Erro.");
                }

            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                appendMessage("ai", "Ocorreu um erro");
                console.error(error);
            }
        }

        function appendMessage(sender, text, id = null) {
            const chatContainer = document.getElementById("chat-container");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}-message`;
            if (id) messageDiv.id = id;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            
            // Scroll automático
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
