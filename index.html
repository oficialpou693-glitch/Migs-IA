<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#151515">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* [O SEU CSS CONTINUA EXATAMENTE O MESMO AQUI] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #111; border-right: 1px solid #222; z-index: 1000; transition: left 0.3s ease; display: flex; flex-direction: column; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-sidebar { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .new-chat-btn { background-color: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { background: #181818; color: #ccc; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid #222; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item.active { background: #2a2a2a; color: #fff; border-color: #555; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }
        header { padding: 10px 15px; width: 100%; border-bottom: 1px solid #222; background-color: #151515; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; padding-right: 5px; }
        .logo-img { height: 35px; width: auto; border-radius: 5px; }
        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .custom-select { background: #181818; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 6px; outline: none; cursor: pointer; font-size: 0.75rem; }
        .login-btn { background: #4285F4; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .user-name { font-size: 0.75rem; color: #fff; font-weight: bold; display: none; }
        #chat-container { flex: 1; width: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin: 0 auto; max-width: 800px;}
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; border-right: 4px solid #fff; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; border-bottom-left-radius: 2px; }
        img.chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; display: block; }
        .input-area { width: 100%; padding: 15px 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; max-width: 800px; margin: 0 auto;}
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 14px; border-radius: 10px; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="overlay" class="overlay"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; color: #fff;">Meus Chats</span>
            <button id="closeSidebarBtn" class="close-sidebar">×</button>
        </div>
        <button id="newChatBtn" class="new-chat-btn">+ Novo Papo</button>
        <div id="chatList" class="chat-list"></div>
    </div>

    <header>
        <div class="logo-container">
            <button id="menuBtn" class="menu-btn">☰</button>
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img">
            <span style="font-weight: bold; font-size: 1rem; color: #fff;">MIGS AI</span>
        </div>
        <div class="controls">
            <select id="langMenu" class="custom-select">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
            </select>
            <select id="personaMenu" class="custom-select">
                <option value="sarcastic">Sarcástico</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritado</option>
            </select>
            <button id="loginBtn" class="login-btn">Login</button>
            <span id="userName" class="user-name"></span>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Fala aí, mano..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
    </div>

    <script type="module">
        // [O SEU SCRIPT DO FIREBASE FICA AQUI IGUALZINHO]
        // ... (Copie o script do Firebase que te mandei antes aqui) ...
        
        // APENAS ADICIONE ISSO NO FINAL DO SCRIPT MODULE:
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Migs AI: Service Worker Ativo!', reg);
                }).catch(err => {
                    console.log('Erro no Service Worker', err);
                });
            });
        }
    </script>
</body>
</html>
