<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Mantendo seu estilo dark original */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        header { 
            padding: 10px 20px; width: 100%; border-bottom: 1px solid #222; 
            background-color: #151515; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 45px; width: auto; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .custom-select {
            background: #181818; color: #fff; border: 1px solid #333; padding: 5px;
            border-radius: 6px; outline: none; cursor: pointer; font-size: 0.8rem;
        }
        .login-btn { 
            background: #4285F4; color: white; border: none; padding: 8px 12px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.75rem;
        }
        #chat-container { flex: 1; width: 100%; max-width: 750px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; border-right: 3px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; }
        .input-area { width: 100%; max-width: 750px; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        img.chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" alt="Migs Studios" class="logo-img">
            <span style="font-weight: bold;">MIGS AI</span>
        </div>
        <div class="controls">
            <select id="personaMenu" class="custom-select">
                <option value="sarcastic">Sarcástico</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritado</option>
            </select>
            <button id="loginBtn" class="login-btn">Login</button>
            <span id="userName" style="display:none; font-size: 0.7rem;"></span>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Manda a real, mano...">
        <button class="send-btn" id="sendBtn">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE",
            authDomain: "migs-ai.firebaseapp.com",
            projectId: "migs-ai",
            storageBucket: "migs-ai.firebasestorage.app",
            messagingSenderId: "497142458753",
            appId: "1:497142458753:web:e99b79b5128ec6e8d02080"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let chatHistory = [];
        const API_KEY_GROQ = "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";

        const basePrompt = "Você é o Migs AI, um garoto de 16 anos. Use gírias como 'brother' e 'mano'.";
        const personas = {
            sarcastic: basePrompt + " Persona: Sarcástico e zueiro.",
            friendly: basePrompt + " Persona: Muito amigável e prestativo.",
            irritated: basePrompt + " Persona: Irritado e sem paciência."
        };

        // --- LOGIN ---
        document.getElementById("loginBtn").onclick = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (e) { alert("Erro no login, brother!"); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userName").style.display = "block";
                document.getElementById("userName").innerText = user.displayName.split(' ')[0];
                await carregarChat();
            }
        });

        // --- BANCO DE DADOS ---
        async function salvarChat() {
            if (currentUser) await setDoc(doc(db, "chats", currentUser.uid), { messages: chatHistory });
        }

        async function carregarChat() {
            const docSnap = await getDoc(doc(db, "chats", currentUser.uid));
            if (docSnap.exists()) {
                chatHistory = docSnap.data().messages;
                renderChat();
            } else {
                resetChat();
            }
        }

        function resetChat() {
            const p = document.getElementById("personaMenu").value;
            chatHistory = [{ role: "system", content: personas[p] }];
            renderChat();
            appendMessage("ai", "E aí, mano! Sou o Migs. Qual a boa?");
        }

        function renderChat() {
            document.getElementById("chat-container").innerHTML = '';
            chatHistory.forEach(msg => {
                if (msg.role !== "system") appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
            });
        }

        // --- ENVIO ---
        document.getElementById("sendBtn").onclick = sendMessage;
        document.getElementById("userInput").onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("user", text);
            input.value = "";
            chatHistory.push({ role: "user", content: text });

            // Atualiza o prompt do sistema caso o modo tenha mudado
            const p = document.getElementById("personaMenu").value;
            chatHistory[0].content = personas[p];

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.7 })
                });
                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: aiRes });
                appendMessage("ai", aiRes);
                salvarChat();
            } catch (e) { appendMessage("ai", "Vixe, deu erro."); }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            div.innerHTML = marked.parse(text);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            div.querySelectorAll('img').forEach(img => img.classList.add('chat-img'));
        }

        // Listener para mudar o modo em tempo real
        document.getElementById("personaMenu").onchange = () => {
            if (chatHistory.length > 0) {
                const p = document.getElementById("personaMenu").value;
                chatHistory[0].content = personas[p];
                appendMessage("ai", `*Modo alterado para ${p}*`);
            }
        };
    </script>
</body>
</html>
