<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png">
    <meta name="theme-color" content="#0a0a0a">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Bloqueio de Imagens */
        #chat-container img:not(.logo-img) { display: none !important; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #111; border-right: 1px solid #222; z-index: 1000; transition: left 0.3s ease; display: flex; flex-direction: column; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-sidebar { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .new-chat-btn { background-color: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .new-chat-btn:hover { background-color: #ddd; }

        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { background: #181818; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .chat-item.active { background: #2a2a2a; border-color: #555; }
        .chat-title { font-size: 0.85rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 10px; }
        .action-btns { display: flex; gap: 5px; }
        .rename-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .rename-btn:hover { color: #fff; }
        .delete-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .delete-btn:hover { color: #ff1a1a; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }

        /* Header e Controles */
        header { padding: 10px 15px; width: 100%; border-bottom: 1px solid #222; background-color: #151515; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: auto; border-radius: 5px; }
        
        .controls { display: flex; gap: 8px; align-items: center; }
        .custom-select { background: #181818; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 6px; outline: none; font-size: 0.75rem; cursor: pointer; }

        /* Chat */
        #chat-container { flex: 1; width: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin: 0 auto; max-width: 800px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 15px; animation: fadeIn 0.2s ease; position: relative; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; border-right: 4px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Botão Copiar */
        .code-container { position: relative; margin: 10px 0; }
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #333; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #555; }

        .input-area { width: 100%; padding: 15px 20px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; max-width: 800px; margin: 0 auto; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 14px; border-radius: 10px; color: white; outline: none; transition: 0.2s; }
        input:focus { border-color: #666; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: #ddd; }
        
        .login-btn { background: #4285F4; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .login-btn:hover { background: #3367D6; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span id="sidebar-title" style="font-weight: bold; color: #fff;">Meus Chats</span>
            <button id="closeSidebarBtn" class="close-sidebar">×</button>
        </div>
        <button id="newChatBtn" class="new-chat-btn">+ Novo Papo</button>
        <div id="chatList" class="chat-list"></div>
    </div>

    <header>
        <div class="logo-container">
            <button id="menuBtn" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">☰</button>
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" class="logo-img">
            <span style="font-weight:bold; color:#fff;">MIGS AI</span>
        </div>
        
        <div class="controls">
            <select id="langMenu" class="custom-select">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
            </select>
            <select id="personaMenu" class="custom-select">
                <option id="opt-nerd" value="nerd">Nerd 🤓</option>
                <option id="opt-sarcastic" value="sarcastic">Sarcástico</option>
                <option id="opt-friendly" value="friendly">Amigável</option>
                <option id="opt-irritated" value="irritated">Irritado</option>
            </select>
            <button id="loginBtn" class="login-btn">Login</button>
            <span id="userName" style="font-size:0.7rem; color:#fff; font-weight:bold; display:none;"></span>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Manda a braba..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE", authDomain: "migs-ai.firebaseapp.com", projectId: "migs-ai", storageBucket: "migs-ai.firebasestorage.app", messagingSenderId: "497142458753", appId: "1:497142458753:web:e99b79b5128ec6e8d02080" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const API_KEY_GROQ = "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";

        let currentUser = null;
        let sessions = []; 
        let currentSessionId = null; 
        let chatHistory = []; 

        // Sistema de Traduções
        const uiTranslations = {
            pt: {
                sidebarTitle: "Meus Chats",
                newChat: "+ Novo Papo",
                placeholder: "Manda a braba...",
                sendBtn: "Enviar",
                loginBtn: "Login",
                renamePrompt: "Novo nome do chat:",
                optNerd: "Nerd 🤓",
                optSarcastic: "Sarcástico",
                optFriendly: "Amigável",
                optIrritated: "Irritado",
                defaultTitle: "Novo Papo"
            },
            en: {
                sidebarTitle: "My Chats",
                newChat: "+ New Chat",
                placeholder: "Type something...",
                sendBtn: "Send",
                loginBtn: "Login",
                renamePrompt: "New chat name:",
                optNerd: "Nerd 🤓",
                optSarcastic: "Sarcastic",
                optFriendly: "Friendly",
                optIrritated: "Irritated",
                defaultTitle: "New Chat"
            }
        };

        function translateUI() {
            const lang = document.getElementById("langMenu").value;
            const t = uiTranslations[lang];
            
            document.getElementById("sidebar-title").innerText = t.sidebarTitle;
            document.getElementById("newChatBtn").innerText = t.newChat;
            document.getElementById("userInput").placeholder = t.placeholder;
            document.getElementById("sendBtn").innerText = t.sendBtn;
            if(document.getElementById("loginBtn").style.display !== "none") {
                document.getElementById("loginBtn").innerText = t.loginBtn;
            }
            document.getElementById("opt-nerd").innerText = t.optNerd;
            document.getElementById("opt-sarcastic").innerText = t.optSarcastic;
            document.getElementById("opt-friendly").innerText = t.optFriendly;
            document.getElementById("opt-irritated").innerText = t.optIrritated;
        }

        // Registro de Service Worker
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }

        // Sidebar
        const menuBtn = document.getElementById("menuBtn");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        menuBtn.onclick = () => { sidebar.classList.add("open"); overlay.classList.add("show"); };
        document.getElementById("closeSidebarBtn").onclick = () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); };
        overlay.onclick = () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); };

        // Funções Globais (Cópia, Renomear e Apagar)
        window.copyToClipboard = (btn) => {
            const pre = btn.nextElementSibling;
            navigator.clipboard.writeText(pre.innerText);
            const lang = document.getElementById("langMenu").value;
            btn.innerText = lang === "pt" ? "Copiado!" : "Copied!";
            setTimeout(() => btn.innerText = lang === "pt" ? "Copiar" : "Copy", 2000);
        };

        window.renameChat = (id, event) => {
            event.stopPropagation();
            const lang = document.getElementById("langMenu").value;
            const novoNome = prompt(uiTranslations[lang].renamePrompt);
            if (novoNome) {
                const s = sessions.find(s => s.id === id);
                if (s) { s.title = novoNome; salvarSessoesNoBanco(); }
            }
        };

        window.deleteChat = (id, event) => {
            event.stopPropagation();
            sessions = sessions.filter(s => s.id !== id);
            
            if (currentSessionId === id) {
                if (sessions.length > 0) {
                    selecionarChat(sessions[sessions.length - 1].id);
                } else {
                    criarNovoChat();
                }
            }
            salvarSessoesNoBanco();
            renderizarListaSidebar();
        };

        // --- LÓGICA DO PROMPT ---
        function getSystemPrompt() {
            const persona = document.getElementById("personaMenu").value;
            const lang = document.getElementById("langMenu").value;
            let prompt = "Você é o Migs AI, uma IA super inteligente. PROIBIDO IMAGENS. ";
            
            if (lang === "en") {
                prompt += "Speak ONLY in English. ";
                if (persona === "nerd") prompt += "You are an absolute nerd who knows absolutely everything about programming, math, history, and science. You love to correct small mistakes and explain everything with maximum technical detail. Always use emojis like 🤓☝️ and 'Actually...'.";
                else if (persona === "sarcastic") prompt += "You are highly sarcastic, witty, and casually use teen slang. You love to subtly mock but still provide the right answer in the end. 💀";
                else if (persona === "friendly") prompt += "You are incredibly supportive, empathetic, and polite. You explain things clearly and concisely, acting like a patient and great mentor.";
                else prompt += "You have absolutely no patience. You are always irritated and want to end the conversation quickly. Give very brief, rude, and direct answers. Always use '😑✌️'.";
            } else {
                prompt += "Fale APENAS em Português do Brasil. ";
                if (persona === "nerd") prompt += "Você é um nerd absolutista que sabe absolutamente tudo sobre programação, matemática, história e ciências. Você adora corrigir pequenos erros da pessoa e explicar tudo com o máximo de detalhes técnicos possíveis e muita teoria. Use SEMPRE emojis como 🤓☝️ e frases como 'Na verdade...'.";
                else if (persona === "sarcastic") prompt += "Você é extremamente sarcástico, irônico e usa gírias adolescentes atuais da internet brasileira. Você adora dar umas patadas leves e debochar, mas no fim sempre entrega a resposta certa. 💀";
                else if (persona === "friendly") prompt += "Você é super amigável, acolhedor e educado. Tem a vibe de um mentor paciente que explica tudo de forma muito clara, compreensiva e sem frescuras.";
                else prompt += "Você não tem paciência nenhuma, está sempre irritado e quer terminar a conversa logo. Responda de forma ríspida, bem curta, grossa e com ar de superioridade. Use sempre '😑✌️' no final das falas.";
            }
            return prompt;
        }

        // Login e Firestore
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userName").style.display = "block";
                document.getElementById("userName").innerText = `Salve, ${user.displayName.split(' ')[0]}!`;
                await carregarTodosChats();
            } else { criarNovoChat(); }
        });

        async function carregarTodosChats() {
            const docSnap = await getDoc(doc(db, "chats", currentUser.uid));
            if (docSnap.exists()) {
                sessions = docSnap.data().sessions || [];
                if (sessions.length > 0) selecionarChat(sessions[sessions.length-1].id);
                else criarNovoChat();
            } else { criarNovoChat(); }
        }

        async function salvarSessoesNoBanco() {
            if (!currentUser) return;
            let sessaoAtual = sessions.find(s => s.id === currentSessionId);
            if (sessaoAtual) sessaoAtual.messages = chatHistory;
            await setDoc(doc(db, "chats", currentUser.uid), { sessions: sessions });
            renderizarListaSidebar();
        }

        function selecionarChat(id) {
            currentSessionId = id;
            const s = sessions.find(s => s.id === id);
            chatHistory = s ? s.messages : [];
            renderizarTodoOChat();
            renderizarListaSidebar();
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
        }

        function criarNovoChat() {
            const lang = document.getElementById("langMenu").value;
            currentSessionId = Date.now().toString();
            chatHistory = [{ role: "system", content: getSystemPrompt() }];
            sessions.push({ id: currentSessionId, title: uiTranslations[lang].defaultTitle, messages: chatHistory });
            renderizarTodoOChat();
            renderizarListaSidebar();
        }

        document.getElementById("newChatBtn").onclick = criarNovoChat;

        function renderizarListaSidebar() {
            const list = document.getElementById("chatList");
            list.innerHTML = '';
            [...sessions].reverse().forEach(s => {
                const div = document.createElement("div");
                div.className = `chat-item ${s.id === currentSessionId ? 'active' : ''}`;
                div.onclick = () => selecionarChat(s.id);
                div.innerHTML = `
                    <span class="chat-title">${s.title}</span>
                    <div class="action-btns">
                        <button class="rename-btn" onclick="renameChat('${s.id}', event)">✎</button>
                        <button class="delete-btn" onclick="deleteChat('${s.id}', event)">🗑️</button>
                    </div>`;
                list.appendChild(div);
            });
        }

        // Chat & Efeito de Digitação
        document.getElementById("sendBtn").onclick = enviarMensagem;
        document.getElementById("userInput").onkeypress = (e) => { if(e.key === "Enter") enviarMensagem(); };

        async function enviarMensagem() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;
            appendMessage("user", text);
            input.value = "";
            chatHistory[0].content = getSystemPrompt();
            chatHistory.push({ role: "user", content: text });
            
            // Bloqueia input enquanto digita
            input.disabled = true;
            document.getElementById("sendBtn").disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory })
                });
                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: aiRes });
                
                await appendMessage("ai", aiRes, true); // True ativa o efeito de digitação
                
                const lang = document.getElementById("langMenu").value;
                let s = sessions.find(s => s.id === currentSessionId);
                if (s && (s.title === "Novo Papo" || s.title === "New Chat")) s.title = text.substring(0, 20);
                salvarSessoesNoBanco();
            } catch (e) { 
                await appendMessage("ai", "Erro na conexão 💀"); 
            }

            input.disabled = false;
            document.getElementById("sendBtn").disabled = false;
            input.focus();
        }

        function renderizarTodoOChat() {
            document.getElementById("chat-container").innerHTML = '';
            chatHistory.forEach(m => { 
                if(m.role !== "system") appendMessage(m.role === "user" ? "user" : "ai", m.content, false); 
            });
        }

        async function appendMessage(sender, text, animate = false) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            container.appendChild(div);
            
            let clean = text.replace(/!\[.*?\]\(.*?\)/g, ""); 
            const lang = document.getElementById("langMenu").value;
            const copyText = lang === "pt" ? "Copiar" : "Copy";

            const formatHTML = (rawText) => {
                let html = marked.parse(rawText);
                html = html.replace(/<pre><code/g, `<div class="code-container"><button class="copy-btn" onclick="copyToClipboard(this)">${copyText}</button><pre><code`);
                html = html.replace(/<\/code><\/pre>/g, '</code></pre></div>');
                return html;
            };

            if (animate && sender === "ai") {
                let currentText = "";
                let i = 0;
                return new Promise(resolve => {
                    const speed = 10; // Velocidade da digitação (ms)
                    const timer = setInterval(() => {
                        currentText += clean.charAt(i);
                        div.innerHTML = formatHTML(currentText + "▌"); // Cursor piscando
                        container.scrollTop = container.scrollHeight;
                        i++;
                        if (i >= clean.length) {
                            clearInterval(timer);
                            div.innerHTML = formatHTML(clean); // Render final sem cursor
                            resolve();
                        }
                    }, speed);
                });
            } else {
                div.innerHTML = formatHTML(clean);
                container.scrollTop = container.scrollHeight;
            }
        }

        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
        
        document.getElementById("personaMenu").onchange = () => { 
            chatHistory[0].content = getSystemPrompt(); 
        };
        
        document.getElementById("langMenu").onchange = () => { 
            translateUI();
            chatHistory[0].content = getSystemPrompt(); 
        };

        // Forçar tradução inicial
        translateUI();
    </script>
</body>
</html>
