<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Minimalista</title>
    <style>
        /* CSS - DESIGN ESCURO E FOSCO (CLEAN) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #d1d1d1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        header {
            padding: 20px;
            text-align: center;
            width: 100%;
            border-bottom: 1px solid #2a2a2a;
            background-color: #181818;
        }

        header h1 {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 700px;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilo das Mensagens (Sem bordas arredondadas exageradas, sem sombras) */
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 6px;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: #2b2b2b;
            color: #ffffff;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #1e1e1e;
            color: #d1d1d1;
            border: 1px solid #2a2a2a;
        }

        /* Área de Input */
        .input-area {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            display: flex;
            gap: 12px;
            background: #121212;
            border-top: 1px solid #2a2a2a;
        }

        input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 14px;
            border-radius: 6px;
            color: white;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #555;
        }

        button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 0 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #e0e0e0;
        }

        /* Scrollbar Discreta */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: #121212;
        }
    </style>
</head>
<body>

    <header>
        <h1>MIGS AI</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Olá. Como posso ajudar?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Envie uma mensagem..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        // JAVASCRIPT
        const API_KEY = "AQ.Ab8RN6KOUFDWh4mU_uMTFFLpfjZWphaJtcFdmFl5zkZBxuy1Ig"; // Chave inserida conforme solicitado

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatContainer = document.getElementById("chat-container");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            appendMessage("user", messageText);
            inputField.value = "";

            const loadingId = "loading-" + Date.now();
            appendMessage("ai", "Processando...", loadingId);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: messageText }] }]
                    })
                });

                const data = await response.json();
                
                document.getElementById(loadingId).remove();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    appendMessage("ai", aiResponse);
                } else {
                    appendMessage("ai", "Erro: Resposta inválida. Verifique se a API Key fornecida é do Google Gemini e está correta.");
                }

            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("ai", "Erro de conexão. A chave pode ser inválida ou o serviço está indisponível.");
                console.error(error);
            }
        }

        function appendMessage(sender, text, id = null) {
            const chatContainer = document.getElementById("chat-container");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}-message`;
            if (id) messageDiv.id = id;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
  </html>
