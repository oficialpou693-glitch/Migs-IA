<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | Migs Studios</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#151515">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #d1d1d1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; width: 100vw; }
        
        /* CSS DE BLOQUEIO TOTAL */
        img, picture, svg, canvas { display: none !important; opacity: 0 !important; pointer-events: none !important; }

        #chat-container { flex: 1; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; max-width: 100%; margin: 0 auto; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; font-size: 15px; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: #2a2a2a; border-right: 4px solid #fff; }
        .ai-message { align-self: flex-start; background-color: #181818; border: 1px solid #252525; }

        header { padding: 10px 15px; border-bottom: 1px solid #222; background-color: #151515; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: auto; border-radius: 5px; display: block !important; opacity: 1 !important; } /* A logo a gente deixa, né? haha */
        
        .controls { display: flex; gap: 8px; align-items: center; }
        .custom-select { background: #181818; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 6px; font-size: 0.75rem; outline: none; }
        
        .input-area { width: 100%; padding: 15px; display: flex; gap: 10px; background: #0f0f0f; border-top: 1px solid #222; }
        input { flex: 1; background: #181818; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 15px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Sidebar básica */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #111; border-right: 1px solid #222; z-index: 1000; transition: left 0.3s ease; display: flex; flex-direction: column; padding: 20px; }
        .sidebar.open { left: 0; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        .chat-item { background: #181818; color: #ccc; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; border: 1px solid #222; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay"></div>
    <div id="sidebar" class="sidebar">
        <button id="newChatBtn" style="padding:10px; cursor:pointer;">+ Novo Papo</button>
        <div id="chatList" class="chat-list"></div>
    </div>

    <header>
        <div class="logo-container">
            <button id="menuBtn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">☰</button>
            <img src="https://raw.githubusercontent.com/oficialpou693-glitch/Migs-IA/refs/heads/main/Picsart_26-06-04_20-37-30-006.png" class="logo-img">
            <span style="font-weight: bold;">MIGS AI</span>
        </div>
        <div class="controls">
            <select id="langMenu" class="custom-select"><option value="pt">🇧🇷 PT</option><option value="en">🇺🇸 EN</option></select>
            <select id="personaMenu" class="custom-select">
                <option value="sarcastic">Sarcástico</option>
                <option value="friendly">Amigável</option>
                <option value="irritated">Irritado</option>
            </select>
            <button id="loginBtn" style="background:#4285F4; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Login</button>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Manda a letra..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyv_-Cf12mMlKBzegxG2YnkpimEN-AATE", authDomain: "migs-ai.firebaseapp.com", projectId: "migs-ai", storageBucket: "migs-ai.firebasestorage.app", messagingSenderId: "497142458753", appId: "1:497142458753:web:e99b79b5128ec6e8d02080" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const API_KEY_GROQ = "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";

        let chatHistory = [];
        let sessions = [];
        let currentSessionId = Date.now().toString();

        // UI
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        document.getElementById("menuBtn").onclick = () => { sidebar.classList.add("open"); overlay.classList.add("show"); };
        overlay.onclick = () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); };

        function getPrompt() {
            const p = document.getElementById("personaMenu").value;
            let base = "Você é o Migs AI, 16 anos. Fale APENAS texto. PROIBIDO markdown de imagem ou links de fotos. ";
            if(p === "sarcastic") base += "Seja sarcástico e use 💀.";
            else if(p === "friendly") base += "Seja legal.";
            else base += "Seja MUITO grosso, xingue e use 😑✌️.";
            return base;
        }

        async function enviar() {
            const input = document.getElementById("userInput");
            if(!input.value.trim()) return;
            const text = input.value;
            append("user", text);
            input.value = "";
            chatHistory.push({role: "user", content: text});

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": `Bearer ${API_KEY_GROQ}`},
                body: JSON.stringify({model: "llama-3.3-70b-versatile", messages: [{role: "system", content: getPrompt()}, ...chatHistory]})
            });
            const data = await res.json();
            const aiText = data.choices[0].message.content;
            chatHistory.push({role: "assistant", content: aiText});
            append("ai", aiText);
        }

        // A FUNÇÃO QUE MATA AS IMAGENS DE VERDADE
        function append(side, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${side}-message`;
            
            // 1. Remove qualquer Markdown de imagem ![alt](url)
            let clean = text.replace(/!\[.*?\]\(.*?\)/g, "");
            
            // 2. Remove qualquer link solto que pareça imagem
            clean = clean.replace(/https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|svg)/gi, "[Link de Imagem Bloqueado]");

            div.innerHTML = marked.parse(clean);
            
            // 3. Varredura final: Deleta qualquer tag IMG que tenha escapado
            const imgs = div.querySelectorAll("img:not(.logo-img)");
            imgs.forEach(i => i.remove());

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById("sendBtn").onclick = enviar;
        document.getElementById("userInput").onkeypress = (e) => { if(e.key === "Enter") enviar(); };
        
        onAuthStateChanged(auth, (user) => { if(!user) chatHistory = []; });
        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
    </script>
</body>
</html>
