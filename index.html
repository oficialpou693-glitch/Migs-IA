<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migs AI | DeepSeek Edition</title>
    <style>
        /* CSS - DESIGN DARK FOSCO */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #121212;
            color: #d1d1d1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        header {
            padding: 20px;
            text-align: center;
            width: 100%;
            border-bottom: 1px solid #2a2a2a;
            background-color: #181818;
        }

        header h1 {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 700px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: #2b2b2b;
            color: #ffffff;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #1e1e1e;
            color: #d1d1d1;
            border: 1px solid #2a2a2a;
        }

        .input-area {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #121212;
            border-top: 1px solid #2a2a2a;
        }

        input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            color: white;
            outline: none;
        }

        button {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #cccccc;
        }

        #chat-container::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <header>
        <h1>MIGS AI</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Migs AI conectada via DeepSeek. Como posso ajudar?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escreva aqui..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        // CONFIGURAÇÃO DA CHAVE
        const API_KEY = "sk-9b58bcfc9a994e999a75d34f1b4cd179";

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatContainer = document.getElementById("chat-container");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            appendMessage("user", messageText);
            inputField.value = "";

            const loadingId = "loading-" + Date.now();
            appendMessage("ai", "Pensando...", loadingId);

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: "Você é a Migs AI, uma assistente prestativa e minimalista." },
                            { role: "user", content: messageText }
                        ]
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.choices && data.choices[0].message.content) {
                    appendMessage("ai", data.choices[0].message.content);
                } else {
                    appendMessage("ai", "Erro: A chave pode estar sem saldo ou expirada.");
                }

            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("ai", "Erro de conexão com o servidor.");
                console.error(error);
            }
        }

        function appendMessage(sender, text, id = null) {
            const chatContainer = document.getElementById("chat-container");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}-message`;
            if (id) messageDiv.id = id;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }
    </script>
</body>
</html>
